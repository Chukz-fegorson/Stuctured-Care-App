services:
  postgres:
    image: postgres:16
    container_name: strutured-care-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: strutured_care
      POSTGRES_USER: strutured_care
      POSTGRES_PASSWORD: strutured_care
    ports:
      - "5433:5432"
    volumes:
      - strutured-care-postgres-data:/var/lib/postgresql/data

volumes:
  strutured-care-postgres-data:
